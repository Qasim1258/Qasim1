<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      width: 100%;
      max-width: 600px;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      padding: 30px 35px;
    }
    h1 {
      margin-top: 0;
      color: #1f325d;
      font-size: 28px;
    }
    p.description {
      color: #6b7280;
      margin-top: 0;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .form-grid {
      display: grid;
      gap: 16px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #344054;
      font-weight: 600;
    }
    input,
    select,
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #f9fafb;
      color: #111827;
      font-size: 14px;
      box-sizing: border-box;
    }
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
      background: #fff;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .row .full {
      grid-column: 1 / -1;
    }
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 15px;
      cursor: pointer;
    }
    button.submit {
      background: #4f46e5;
      color: #fff;
      box-shadow: 0 12px 24px rgba(79, 70, 229, 0.18);
    }
    button.reset {
      background: #e5e7eb;
      color: #111827;
    }
    .note {
      font-size: 13px;
      color: #6b7280;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Student Registration</h1>
    <p class="description">Complete the form below to register a new student. Required fields are marked with an asterisk (*).</p>
    <form id="registration-form">
      <div class="form-grid">
        <div class="row">
          <div>
            <label for="firstName">First Name *</label>
            <input type="text" id="firstName" name="firstName" placeholder="John" required>
          </div>
          <div>
            <label for="lastName">Last Name *</label>
            <input type="text" id="lastName" name="lastName" placeholder="Doe" required>
          </div>
        </div>
        <div class="row">
          <div>
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" placeholder="john.doe@example.com" required>
          </div>
          <div>
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="(123) 456-7890">
          </div>
        </div>
        <div class="row">
          <div>
            <label for="dob">Date of Birth *</label>
            <input type="date" id="dob" name="dob" required>
          </div>
          <div>
            <label for="gender">Gender</label>
            <select id="gender" name="gender">
              <option value="">Select gender</option>
              <option value="female">Female</option>
              <option value="male">Male</option>
              <option value="nonbinary">Non-binary</option>
              <option value="preferNot">Prefer not to say</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div>
            <label for="grade">Grade / Year *</label>
            <select id="grade" name="grade" required>
              <option value="">Select grade/year</option>
              <option value="freshman">Freshman</option>
              <option value="sophomore">Sophomore</option>
              <option value="junior">Junior</option>
              <option value="senior">Senior</option>
              <option value="graduate">Graduate</option>
            </select>
          </div>
          <div>
            <label for="major">Major / Program</label>
            <input type="text" id="major" name="major" placeholder="Computer Science">
          </div>
        </div>
        <div class="full">
          <label for="address">Address</label>
          <textarea id="address" name="address" placeholder="123 Main St, City, State"></textarea>
        </div>
        <div class="full">
          <label for="notes">Additional Notes</label>
          <textarea id="notes" name="notes" placeholder="Allergies, special accommodations, etc."></textarea>
        </div>
      </div>
      <div class="actions">
        <button type="reset" class="reset">Clear</button>
        <button type="submit" class="submit">Register Student</button>
      </div>
      <p class="note">Note: This is a demo form. Submitted values will appear in the browser console.</p>
    </form>
  </div>
  <script>
    document.getElementById('registration-form').addEventListener('submit', function(event) {
      event.preventDefault();
      const formData = new FormData(event.target);
      const data = Object.fromEntries(formData.entries());
      console.log('Student Registration:', data);
      alert('Student registered successfully! Check the browser console for submitted data.');
      event.target.reset();
    });
  </script>
</body>
</html>
